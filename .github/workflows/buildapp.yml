name: Build and Release uYouEnhanced

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        default: "17.5"
        required: true
      uyou_version:
        default: "3.0.4"
        required: true
      decrypted_youtube_url:
        required: true
        type: string
      bundle_id:
        default: "com.google.ios.youtube"
        required: true
      app_name:
        default: "YouTube"
        required: true
      upload_artifact:
        default: false
        type: boolean
      create_release:
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          path: main
          submodules: recursive

      - name: Install deps
        run: brew install ldid dpkg make wget jq

      - name: Setup Theos
        uses: actions/checkout@v5
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: Set THEOS
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      # 🔥 FIX: normal SDK install (NO broken repo)
      - name: Setup SDK (manual fallback)
        run: |
          mkdir -p $THEOS/sdks
          echo "Use preinstalled Xcode SDK"

      - name: Download IPA
        run: |
          wget -O YouTube.ipa "${{ inputs.decrypted_youtube_url }}"
          unzip -q YouTube.ipa -d app

      - name: Get YouTube version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" app/Payload/YouTube.app/Info.plist)
          echo "YT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build tweak
        run: |
          cd main

          sed -i "s/^BUNDLE_ID.*/BUNDLE_ID = ${{ inputs.bundle_id }}/" Makefile
          sed -i "s/^DISPLAY_NAME.*/DISPLAY_NAME = ${{ inputs.app_name }}/" Makefile
          sed -i "s/^export TARGET.*/export TARGET = iphone:clang:${{ inputs.sdk_version }}:14.0/" Makefile

          make package FINALPACKAGE=1

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: uYouEnhanced
          path: main/packages/*.ipa

      - name: Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          files: main/packages/*.ipa
          tag_name: v${{ env.YT_VERSION }}-${{ inputs.uyou_version }}
