name: Build and Release uYouEnhanced (FIXED)

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: "iOS SDK Version (use 17.5 / 18.0 / etc)"
        default: "17.5"
        required: true
        type: string

      uyou_version:
        description: "uYou Version"
        default: "3.0.4"
        required: true
        type: string

      decrypted_youtube_url:
        description: "Direct IPA URL"
        required: true
        type: string

      bundle_id:
        default: "com.google.ios.youtube"
        required: true
        type: string

      app_name:
        default: "YouTube"
        required: true
        type: string

      upload_artifact:
        default: false
        type: boolean

      create_release:
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          path: main
          submodules: recursive

      - name: Install dependencies
        run: brew install ldid dpkg make wget gnu-sed jq

      - name: Setup Theos
        uses: actions/checkout@v5
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: Set environment
        run: echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Download IPA
        run: |
          wget -O YouTube.ipa "${{ inputs.decrypted_youtube_url }}"
          unzip -q YouTube.ipa -d app

      - name: Extract YouTube version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" app/Payload/YouTube.app/Info.plist)
          echo "YT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Makefile
        run: |
          cd main

          gsed -i "s|^BUNDLE_ID.*|BUNDLE_ID = ${{ inputs.bundle_id }}|" Makefile
          gsed -i "s|^DISPLAY_NAME.*|DISPLAY_NAME = ${{ inputs.app_name }}|" Makefile
          gsed -i "s|^export TARGET.*|export TARGET = iphone:clang:${{ inputs.sdk_version }}:14.0|" Makefile

      - name: Build tweak
        run: |
          cd main
          make clean
          make package FINALPACKAGE=1

      - name: Upload artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: uYouEnhanced
          path: main/packages/*.ipa

      - name: Create Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.YT_VERSION }}-${{ inputs.uyou_version }}
          name: v${{ env.YT_VERSION }}-${{ inputs.uyou_version }}
          files: main/packages/*.ipa
          draft: true
